kind = "web"
previewPath = "/"
title = "Shattered Veil"
version = "1.0.0"
id = "artifacts/shattered-veil"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21515

[services.development]
run = "pnpm --filter @workspace/shattered-veil run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shattered-veil", "run", "build" ]
publicDir = "artifacts/shattered-veil/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21515"
BASE_PATH = "/"
